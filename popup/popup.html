<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>File Downloader</h1>
    <span id="badge" class="badge hidden" aria-label="File count">0</span>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="Filter files...  ( / )" class="search-input">
    <select id="sortSelect" class="sort-select" title="Sort files">
      <option value="default">Default</option>
      <option value="name-asc">A &rarr; Z</option>
      <option value="name-desc">Z &rarr; A</option>
    </select>
  </div>

  <div class="toolbar">
    <button id="selectAll">Select All</button>
    <button id="deselectAll">Deselect All</button>
    <button id="copyUrls" title="Copy selected file URLs to clipboard">Copy URLs</button>
    <button id="downloadBtn" class="primary" disabled>Download Selected</button>
  </div>

  <div class="options-row">
    <label class="subfolder-label" title="Download files into a subfolder within your default download directory">
      Save to subfolder:
      <input type="text" id="subfolder" placeholder="optional" class="subfolder-input">
    </label>
  </div>

  <div id="downloadProgress" class="download-progress hidden">
    <div class="progress-bar-track">
      <div id="progressBar" class="progress-bar-fill"></div>
    </div>
    <div class="progress-info">
      <span id="progressText" class="progress-text"></span>
      <button id="retryBtn" class="retry-btn hidden">Retry Failed</button>
    </div>
  </div>

  <div id="scanDirBar" class="scan-dir-bar hidden">
    <button id="scanDirBtn" class="scan-dir-btn">Scan Subdirectories</button>
    <span id="scanStatus" class="scan-status hidden"></span>
  </div>

  <div id="fileList" class="file-list">
    <div id="loading" class="status-msg">Scanning page...</div>
    <div id="empty" class="status-msg hidden">No downloadable files found.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
